name: Java CI with Maven and Testcontainers

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      # Docker para Testcontainers (necesita acceso al daemon)
      docker:
        image: docker:dind
        options: --privileged

      # WHAT: PostgreSQL 16 como service container para CI
      # WHY: Testcontainers usa Docker externo con Ryuk en CI para
      #       mejor consistencia y limpieza automática de contenedores.
      #       El service container de GH Actions asegura que PG esté disponible
      #       como fallback y para health checks.
      # DIFFERENCES: Antes no había service container PG (solo H2 en tests).
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Test
        # WHAT: Ejecuta Flyway, unit tests e integration tests (Testcontainers)
        # WHY: Testcontainers levanta PostgreSQL automáticamente; las variables
        #       de entorno son fallback para conexiones directas en CI.
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/testdb
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
        run: mvn clean verify

      - name: Publish Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/*.xml
