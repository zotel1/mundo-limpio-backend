# WHAT: Configuración JWT para tests — sin fallback en application.yml principal.
# WHY: Fix de seguridad removió el fallback del secret-key. Los tests que cargan
#      el contexto completo necesitan un valor explícito para JWT_SECRET_KEY.
application:
  security:
    jwt:
      secret-key: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      expiration: 1800000
      refresh-expiration: 604800000

spring:
  datasource:
    # WHAT: Placeholder — valores reales inyectados por @DynamicPropertySource desde Testcontainers
    # WHY: Testcontainers asigna puerto/credenciales dinámicos; estos placeholders aseguran
    #       que hay valores por defecto en caso de ejecución sin Testcontainers
    url: jdbc:postgresql://localhost:5432/testdb
    username: test
    password: test
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # WHAT: none en vez de validate — Hibernate no valida el esquema en tests
      # WHY: La migración MySQL→PostgreSQL tiene diferencias de tipos de datos
      #       (ej: quantity como INTEGER en MySQL → numeric en PostgreSQL)
      #       que Hibernate detecta pero que no afectan el funcionamiento.
      #       Flyway ya ejecuta V1-V4 para crear el esquema correcto.
      # DIFFERENCES: Antes: validate (Hibernate verificaba tipos exactos).
      #              Ahora: none (Flyway gestiona el esquema, Hibernate solo consulta).
      ddl-auto: none
    properties:
      hibernate:
        # WHAT: Dialecto PostgreSQL explícito para asegurar SQL correcto en test
        # WHY: Sin esto, Hibernate podría auto-detectar mal en algunos entornos
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    # WHAT: Flyway habilitado en perfil test — ejecuta migraciones V1-V4 contra PostgreSQL
    # WHY: Las migraciones deben correr ANTES de que Hibernate valide el esquema.
    #       Sin Flyway, el esquema no existe y ddl-auto: validate falla.
    # DIFFERENCES: Antes: enabled: false (Hibernate creaba tablas via create-drop en H2).
    #              Ahora: enabled: true (Flyway crea tablas idénticas a producción).
     enabled: true

# WHAT: Habilitar health probes (liveness/readiness) para validar SecurityConfig wildcard.
# WHY: Sin probes=always, /actuator/health/liveness y /actuator/health/readiness retornan 404.
#      Necesitamos que estén expuestos para verificar que el wildcard /actuator/health/**
#      permite acceso sin autenticación a todos los sub-paths.
management:
  endpoint:
    health:
      probes:
        enabled: true

# WHAT: Configuración de Supabase Storage para tests.
# WHY: SupabaseStorageService necesita estas propiedades para inyectar @Value,
#      aunque en tests de integración del controller se mockee S3Client.
#      Sin estos valores, Spring no puede crear el bean SupabaseStorageService.
app:
  supabase:
    endpoint: https://test-project.supabase.co
    bucket: receipts-test
    public-base-url: https://test-project.supabase.co/storage/v1/object/public
    access-key: test-access-key
    secret-key: test-secret-key
    region: us-east-1
