mode: openspec
strict_tdd: true

context: |
  Stack: Java 21, Spring Boot 3.3.0, Maven 3.9+, PostgreSQL 16, Flyway
  Architecture: Clean Architecture por módulo (domain → repository → service → controller → dto → mapper)
  Testing: JUnit 5 + Mockito + AssertJ (unit), Testcontainers PostgreSQL (integration), JaCoCo (coverage)
  Style: Conventional commits en inglés, comentarios WHAT/WHY/DIFFERENCES en español
  Git: feature/fix branches desde develop → stacked PRs a develop

testing:
  runner: maven-surefire-plugin (JUnit 5)
  layers:
    unit: { available: true, tool: "JUnit 5 + Mockito + AssertJ" }
    integration: { available: true, tool: "Testcontainers PostgreSQL 1.20.6 + Spring Security Test" }
    e2e: { available: false, tool: "-" }
  coverage:
    available: true
    tool: JaCoCo 0.8.12
    command: "mvn clean verify"
    threshold: 0.20
  quality:
    linter: { available: false, command: "-" }
    type_checker: { available: false, command: "-" }
    formatter: { available: false, command: "-" }

rules:
  proposal:
    - Include rollback plan for all changes
    - Include success criteria with measurable outcomes
    - Keep under 450 words
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
    - Write delta specs for modified capabilities, full specs for new
  design:
    - Always read actual codebase before designing
    - Include sequence diagrams for complex flows
    - Keep under 800 words
  tasks:
    - Group by phase using hierarchical numbering
    - Keep tasks completable in one session
    - Forecast 400-line budget risk for PR workload guard
  apply:
    - Follow Strict TDD cycle: RED → GREEN → TRIANGULATE → REFACTOR
    - Run RELEVANT test file only during TDD cycle (not full suite)
    - Run full suite only before commit
    - No AI attribution in commits
    tdd: true
    test_command: "mvn clean verify"
  verify:
    - Execute tests; static analysis alone is never verification
    - Compare spec first, design second, task completion third
    - Report CRITICAL on untested spec scenarios or failing tests
    test_command: "mvn clean verify"
    build_command: "mvn clean verify"
    coverage_threshold: 0.20
  archive:
    - Warn before merging destructive spec deltas
    - Move change folder to archive with ISO date prefix
